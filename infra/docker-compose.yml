services:
  postgres:
    image: postgres:16
    container_name: careercopilot_postgres
    environment:
      POSTGRES_USER: careercopilot_user
      POSTGRES_PASSWORD: careercopilot_password
      POSTGRES_DB: careercopilot_db
    ports:
      - "5433:5432"
    volumes:
      - careercopilot_postgres_data:/var/lib/postgresql/data

volumes:
  careercopilot_postgres_data:
